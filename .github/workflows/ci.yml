name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: chess_coach_test
          POSTGRES_USER: chess_coach
          POSTGRES_PASSWORD: chess_coach
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chess_coach -d chess_coach_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://chess_coach:chess_coach@localhost:5432/chess_coach_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install locked dependencies
        run: python -m pip install -r requirements-dev.lock
      - name: Lint
        run: python -m ruff check .
      - name: Check formatting
        run: python -m ruff format --check .
      - name: Test with coverage
        run: python -m pytest --cov=src --cov-report=term-missing --cov-report=xml
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
